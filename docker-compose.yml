services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: questionnaire
      POSTGRES_USER: questionnaire
      POSTGRES_PASSWORD: questionnaire
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questionnaire"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:

